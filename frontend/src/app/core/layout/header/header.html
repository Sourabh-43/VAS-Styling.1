<header class="main-header">

  <div class="header-container">

    <!-- LEFT -->
    <div class="nav-left">
      <a routerLink="/shop" routerLinkActive="active" class="nav-link">
        Shop
      </a>
    </div>

    <!-- CENTER -->
    <div class="nav-center">

      <a routerLink="/" class="logo">
        VAS-Styling
      </a>

      <div class="search-container">

        <input
          type="text"
          placeholder="Search products..."
          autocomplete="off"
          [value]="searchQuery"
          (input)="onSearch($event)"
        />

        <!-- SEARCH RESULTS -->
        <div class="search-results" *ngIf="suggestions.length">

          <div
            class="search-item"
            *ngFor="let product of suggestions; trackBy: trackProduct"
            (click)="goToProduct(product)"
          >

            <!-- FIXED IMAGE PATH -->
            <img
              [src]="product.image"
              [alt]="product.name"
              loading="lazy"
              onerror="this.src='assets/no-image.png'"
            />

            <div class="search-info">

              <span class="name">
                {{ product.name }}
              </span>

              <span class="price">
                ₹{{ product.price }}
              </span>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="nav-right">

      <!-- NOT LOGGED IN -->
      <ng-container *ngIf="!auth.isLoggedIn()">
        <a routerLink="/login" class="nav-link">Login</a>
      </ng-container>

      <!-- LOGGED IN -->
      <ng-container *ngIf="auth.isLoggedIn()">

        <span class="welcome">
          Hi, {{ auth.getUserName() }}
        </span>

        <a *ngIf="auth.isAdmin()" routerLink="/admin" class="nav-link">
          Admin
        </a>

       <a class="nav-link logout-link" (click)="logout()">
  Logout
</a>
      </ng-container>

      <!-- CART -->
      <a routerLink="/cart" class="cart-icon">
        🛒
        <span *ngIf="cart.count() > 0" class="cart-badge">
          {{ cart.count() }}
        </span>
      </a>

    </div>

  </div>

</header>
