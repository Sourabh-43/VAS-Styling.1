<header class="main-header">

  <!-- 🔥 TOAST -->
  <div class="toast" *ngIf="(cart.message$ | async) as msg">
    ✔ {{ msg }}
  </div>

  <div class="header-container">

    <!-- LEFT -->
    <div class="nav-left">

      <!-- 🍔 HAMBURGER (MOBILE) -->
      <div class="hamburger"
           [class.active]="isMobileMenuOpen"
           (click)="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- DESKTOP SHOP -->
       <a routerLink="/" class="logo">
        VAS-Styling
      </a>

      

    </div>

    <!-- CENTER -->
    <div class="nav-center">

      
      <div class="search-container">

        <input
          type="text"
          placeholder="Search products..."
          autocomplete="off"
          [value]="searchQuery"
          (input)="onSearch($event)"
        />

        <!-- SEARCH RESULTS -->
        <div class="search-results" *ngIf="suggestions.length">

          <div
            class="search-item"
            *ngFor="let product of suggestions; trackBy: trackProduct"
            (click)="goToProduct(product)"
          >

            <img
              [src]="product.image"
              [alt]="product.name"
              loading="lazy"
              onerror="this.src='assets/no-image.png'"
            />

            <div class="search-info">
              <span class="name">{{ product.name }}</span>
              <span class="price">₹{{ product.price }}</span>
            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="nav-right">

      <!-- 👤 USER (AVATAR DROPDOWN) -->
      <div class="user-menu">

        <div class="avatar" (click)="toggleDropdown()">
          {{ auth.getUserName().charAt(0) || 'G' }}
        </div>

        <div class="dropdown" *ngIf="isDropdownOpen">

          <div class="user-info">
            {{ auth.getUserName() || 'Guest' }}
          </div>

          <!-- NOT LOGGED IN -->
          <ng-container *ngIf="!auth.isLoggedIn()">
            <a routerLink="/login" (click)="closeDropdown()">Login</a>
          </ng-container>
          <ng-container>
            <a routerLink="/shop" class="nav-link desktop-only">
        Shop
      </a>
      </ng-container>

          <!-- LOGGED IN -->
          <ng-container *ngIf="auth.isLoggedIn()">

            <a *ngIf="auth.isAdmin()"
               routerLink="/admin"
               (click)="closeDropdown()">
              Admin Panel
            </a>

            <a (click)="logout()">
              Logout
            </a>

          </ng-container>

        </div>

      </div>

      <!-- 🛒 CART -->
      <a routerLink="/cart" class="cart-icon" id="cartIcon">
        🛒
        <span *ngIf="cart.count() > 0" class="cart-badge">
          {{ cart.count() }}
        </span>
      </a>

    </div>

  </div>

  <!-- 📱 MOBILE DRAWER -->
  <div class="mobile-menu" [class.open]="isMobileMenuOpen">

    <div class="mobile-content">

      <a routerLink="/shop" (click)="closeMobileMenu()">Shop</a>

      <ng-container *ngIf="!auth.isLoggedIn()">
        <a routerLink="/login" (click)="closeMobileMenu()">Login</a>
      </ng-container>

      <ng-container *ngIf="auth.isLoggedIn()">

        <a *ngIf="auth.isAdmin()"
           routerLink="/admin"
           (click)="closeMobileMenu()">
          Admin Panel
        </a>

        <a (click)="logout(); closeMobileMenu()">
          Logout
        </a>

      </ng-container>

    </div>

  </div>

  <!-- 🌑 OVERLAY -->
  <div class="overlay"
       *ngIf="isMobileMenuOpen"
       (click)="closeMobileMenu()">
  </div>

</header>
