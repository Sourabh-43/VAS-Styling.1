<section class="admin-page">
  <h2>Orders</h2>

  <p *ngIf="orders().length === 0">No orders yet.</p>

  <table *ngIf="orders().length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Total</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let order of orders()">
        <td>{{ order.id }}</td>
        <td>₹{{ order.total }}</td>
        <td>{{ order.status }}</td>
      </tr>
    </tbody>
  </table>
</section>
